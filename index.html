  <script>
  var e = React.createElement;
  var useState=React.useState, useEffect=React.useEffect, useMemo=React.useMemo, useCallback=React.useCallback;
 
  var MONTHS=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  var M3=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];

  var storage={
    get:function(k){ try{return JSON.parse(localStorage.getItem(k));}catch(x){return null;} },
    set:function(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(x){} }
  };
  function fmt(n){ return (Number(n)||0).toLocaleString('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:0}); }
  function monthNum(y,m){ return y*12+m; }
  function vibrate(p){ if(navigator.vibrate) navigator.vibrate(p||10); }
 
  // ===== Premium amblemler — gerçek banka logoları (yüklenmezse renkli ambleme düşer) =====
  function brandOf(name){
    var l=(name||'').toLowerCase();
    if(/akbank/.test(l)) return {bg:'#e30613', fg:'#fff', mark:'Akbank', logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Akbank_logo.svg/250px-Akbank_logo.svg.png'};
    if(/garanti|bbva|ozum|özüm|troy/.test(l)) return {bg:'#00754a', fg:'#fff', mark:'Garanti', logo:'https://upload.wikimedia.org/wikipedia/en/thumb/4/4d/Garanti_BBVA_Logo.svg/250px-Garanti_BBVA_Logo.svg.png'};
    if(/bankası|bankasi|is bank|işbank|isbank|iş bank|türkiye is/.test(l)) return {bg:'#0a3d91', fg:'#fff', mark:'İş Bankası', logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/T%C3%BCrkiye_%C4%B0%C5%9F_Bankas%C4%B1_logo.svg/250px-T%C3%BCrkiye_%C4%B0%C5%9F_Bankas%C4%B1_logo.svg.png'};
    if(/enpara/.test(l)) return {bg:'#7d2ae8', fg:'#fff', mark:'enpara', logo:'https://www.enpara.com/Frontend/dist/images/enpara.svg'};
    if(/albaraka|albarak/.test(l)) return {bg:'#00a19a', fg:'#fff', mark:'Albaraka', logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Al_Baraka_Banking_Group_Logo.svg/250px-Al_Baraka_Banking_Group_Logo.svg.png'};
    if(/ssk|bağkur|bagkur|sgk|sosyal/.test(l)) return {bg:'#1f4e9c', fg:'#fff', mark:'SGK', logo:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/00/T.C._Sosyal_G%C3%BCvenlik_Kurumu_logo.svg/250px-T.C._Sosyal_G%C3%BCvenlik_Kurumu_logo.svg.png'};
    if(/eminevim|emin evim/.test(l)) return {bg:'#00854a', fg:'#fff', mark:'eminevim'};
    if(/ziraat/.test(l)) return {bg:'#d6121f', fg:'#fff', mark:'Ziraat'};
    if(/yapı ?kredi|yapikredi/.test(l)) return {bg:'#004990', fg:'#fff', mark:'Yapı Kredi'};
    if(/halkbank|halk bank/.test(l)) return {bg:'#005baa', fg:'#fff', mark:'Halkbank'};
    if(/vakıf|vakif/.test(l)) return {bg:'#f7b500', fg:'#1a2230', mark:'Vakıf'};
    if(/qnb|finansbank/.test(l)) return {bg:'#5b2d8e', fg:'#fff', mark:'QNB'};
    if(/teb/.test(l)) return {bg:'#00a651', fg:'#fff', mark:'TEB'};
    if(/deniz ?bank|denizbank/.test(l)) return {bg:'#e2001a', fg:'#fff', mark:'Deniz'};
    if(/ing/.test(l)) return {bg:'#ff6200', fg:'#fff', mark:'ING'};
    if(/sağlık|saglik|sigorta|tamamlayici/.test(l)) return {bg:'#0a8f5b', fg:'#fff', icon:'🩺', big:true};
    if(/aidat/.test(l)) return {bg:'linear-gradient(145deg,#7c8da3,#4a5a70)', fg:'#fff', icon:'🏢', big:true};
    if(/kira|konut|ev|rezidans|residence|site|apartman/.test(l)) return {bg:'linear-gradient(145deg,#3f6f5b,#27503f)', fg:'#fff', icon:'🏠', big:true};
    if(/elektrik|su|doğalgaz|dogalgaz|fatura|internet|telefon/.test(l)) return {bg:'#0891b2', fg:'#fff', icon:'⚡', big:true};
    if(/market|mutfak/.test(l)) return {bg:'#ca8a04', fg:'#fff', icon:'🛒', big:true};
    if(/altın|altin|gram|çeyrek|ceyrek/.test(l)) return {bg:'#b8902f', fg:'#fff', icon:'🪙', big:true};
    if(/nakit|kasa/.test(l)) return {bg:'#15a06a', fg:'#fff', icon:'💵', big:true};
    var first=(name||'?').trim().charAt(0).toUpperCase();
    var palette=['#6d28d9','#be123c','#0369a1','#047857','#a16207','#9333ea','#0e7490'];
    return {bg:palette[(name||'').length % palette.length], fg:'#fff', icon:first, big:true};
  }
  function Emblem(props){
    var b=brandOf(props.name); var sz=props.size||44;
    var err=useState(false); var failed=err[0],setFailed=err[1];
    var box={width:sz,height:sz,borderRadius:sz*0.27,background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 1px 3px rgba(0,0,0,0.12)',overflow:'hidden',border:'1px solid rgba(0,0,0,0.06)'};
    if(b.logo && !failed){
      return e('div',{style:box}, e('img',{src:b.logo, alt:'', onError:function(){setFailed(true);}, style:{width:'78%',height:'78%',objectFit:'contain'}}));
    }
    var fbox={width:sz,height:sz,borderRadius:sz*0.27,background:b.bg,color:b.fg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'inset 0 -2px 6px rgba(0,0,0,0.14)',overflow:'hidden'};
    if(b.icon) return e('div',{style:fbox}, e('span',{style:{fontSize:sz*0.46}}, b.icon));
    return e('div',{style:fbox}, e('span',{style:{fontSize:b.mark.length>=8?(sz*0.185):(b.mark.length>6?sz*0.22:sz*0.28),fontWeight:800,lineHeight:1.05,textAlign:'center',padding:'0 1px',letterSpacing:-0.3,whiteSpace:'nowrap'}}, b.mark));
  }
 
  function classify(name){
    var l=(name||'').toLowerCase();
